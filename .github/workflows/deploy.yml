name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/luxpretty-backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/luxpretty-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/luxpretty-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/luxpretty-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy on VPS
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /home/deploy/luxpretty
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export BACKEND_IMAGE="ghcr.io/${{ github.repository_owner }}/luxpretty-backend:${{ github.sha }}"
            export FRONTEND_IMAGE="ghcr.io/${{ github.repository_owner }}/luxpretty-frontend:${{ github.sha }}"
            echo "Pulling ${BACKEND_IMAGE} and ${FRONTEND_IMAGE}"
            docker compose -f docker-compose.prod.yml --env-file .env pull backend frontend
            docker compose -f docker-compose.prod.yml --env-file .env up -d
            docker image prune -f
            docker compose -f docker-compose.prod.yml ps

      - name: Wait for backend to become ready
        run: |
          for i in $(seq 1 24); do
            CODE=$(curl -sk -o /dev/null -w '%{http_code}' https://luxpretty.lu/api/cares || echo 000)
            echo "attempt $i: backend HTTP $CODE"
            if [ "$CODE" = "200" ] || [ "$CODE" = "401" ] || [ "$CODE" = "403" ]; then
              echo "BACKEND_OK"
              break
            fi
            sleep 5
          done

      - name: Health check
        run: |
          set -e
          curl -fsS https://luxpretty.lu/ -o /dev/null
          echo "Frontend OK"
          CODE=$(curl -sk -o /dev/null -w '%{http_code}' https://luxpretty.lu/api/cares)
          [ "$CODE" = "200" ] || [ "$CODE" = "401" ] || [ "$CODE" = "403" ] || (echo "Backend KO ($CODE)" && exit 1)
          echo "Backend OK ($CODE)"

  # ── ntfy notifications ─────────────────────────────────────────────────
  # Runs after all deploy jobs regardless of outcome.
  notify:
    name: Notify deploy status
    needs: [build-backend, build-frontend, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify on success
        if: needs.deploy.result == 'success' && needs.build-backend.result == 'success' && needs.build-frontend.result == 'success'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [ -z "${NTFY_TOPIC:-}" ]; then echo "NTFY_TOPIC unset, skipping"; exit 0; fi
          # Headers reject newlines — keep only the first line for the title.
          # The full message goes in the body where multi-line is fine.
          SUBJECT=$(printf '%s' "$COMMIT_MESSAGE" | head -n 1)
          curl -sS \
            -H "Title: 🚀 Deploy OK — ${SUBJECT}" \
            -H "Tags: rocket" \
            -H "Click: https://luxpretty.lu/" \
            --data-binary "$(printf 'https://luxpretty.lu is live with %s\n\n%s' "$COMMIT_SHA" "$COMMIT_MESSAGE")" \
            "https://ntfy.sh/${NTFY_TOPIC}"

      - name: Notify on failure
        if: needs.deploy.result == 'failure' || needs.build-backend.result == 'failure' || needs.build-frontend.result == 'failure'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          GH_ACTOR: ${{ github.actor }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BUILD_BACKEND: ${{ needs.build-backend.result }}
          BUILD_FRONTEND: ${{ needs.build-frontend.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          if [ -z "${NTFY_TOPIC:-}" ]; then echo "NTFY_TOPIC unset, skipping"; exit 0; fi
          SUBJECT=$(printf '%s' "$COMMIT_MESSAGE" | head -n 1)
          curl -sS \
            -H "Title: ⚠️ Deploy failed — ${SUBJECT}" \
            -H "Priority: high" \
            -H "Tags: warning,${GH_ACTOR}" \
            -H "Click: ${RUN_URL}" \
            --data-binary "build-backend=${BUILD_BACKEND} · build-frontend=${BUILD_FRONTEND} · deploy=${DEPLOY_RESULT}" \
            "https://ntfy.sh/${NTFY_TOPIC}"
