# Profile: test-oracle — marker profile used by BookingConcurrencyOracleTests.
# Actual datasource coordinates are injected at runtime by @DynamicPropertySource
# from the OracleContainer, so the values below are placeholders only.
# This profile also inherits common test properties (JWT, OAuth2 dummies, mail
# disabled) defined in application-test.properties via @ActiveProfiles("test-oracle").

# DataSource placeholders — overridden at runtime by @DynamicPropertySource
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/FREEPDB1
spring.datasource.username=test
spring.datasource.password=test
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Provisioning datasource — also overridden at runtime by DynamicPropertySource
app.multitenancy.application-schema=APPUSER
app.multitenancy.provisioning.jdbc-url=jdbc:oracle:thin:@localhost:1521/FREEPDB1
app.multitenancy.provisioning.username=test
app.multitenancy.provisioning.password=test

# JWT secret
app.auth.token.secret=test-secret-key-for-integration-tests-must-be-256-bits-long-enough
app.auth.token.expiration-ms=3600000

# OAuth2 dummy config
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=openid,profile,email
app.oauth2.authorized-redirect-uri=http://localhost:4300/oauth2/redirect

# Mail (disabled)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test
app.mail.from=test@example.com
app.mail.from-name=Test

# Misc
app.upload.dir=target/test-uploads
app.cors.allowed-origins=http://localhost:4300,http://localhost:4200
app.frontend.base-url=http://localhost:4300
