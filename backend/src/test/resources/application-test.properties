# Profile: test — used by full-stack integration tests (@ActiveProfiles("test")).
# This file is layered on top of src/test/resources/application.properties, which
# already configures H2 in-memory + dummy OAuth2 + JWT secret for the mocked
# unit-test suite. The settings below are the ones integration tests rely on
# explicitly (so the intent is visible at the test config level, and so the
# profile can evolve independently of the default test config).

# H2 in-memory, Oracle compat mode — same URL used by provisioning so tenant
# schemas are created in the same in-memory database.
spring.datasource.url=jdbc:h2:mem:testdb;MODE=Oracle;DATABASE_TO_LOWER=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Smaller connection pool for tests (a few concurrent threads at most)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# Multi-tenancy: provisioning DataSource points at the same H2 memory DB so
# TenantSchemaManager creates tenant schemas inside the test database.
app.multitenancy.application-schema=APPUSER
app.multitenancy.provisioning.jdbc-url=jdbc:h2:mem:testdb;MODE=Oracle;DATABASE_TO_LOWER=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
app.multitenancy.provisioning.username=sa
app.multitenancy.provisioning.password=

# JWT secret (must be >= 32 bytes for HS256)
app.auth.token.secret=test-secret-key-for-integration-tests-must-be-256-bits-long-enough
app.auth.token.expiration-ms=3600000

# OAuth2 dummy config (prevents Google OAuth2 auto-config failure)
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=openid,profile,email
app.oauth2.authorized-redirect-uri=http://localhost:4300/oauth2/redirect

# Mail config (disable real SMTP in tests)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test
app.mail.from=test@example.com
app.mail.from-name=Test

# Disable file upload in tests
app.upload.dir=target/test-uploads

# CORS permissive for local test clients
app.cors.allowed-origins=http://localhost:4300,http://localhost:4200
