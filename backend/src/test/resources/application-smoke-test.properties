# Profile: smoke-test — used by Playwright full-stack smoke tests.
#
# Layers on top of src/test/resources/application.properties (H2 in-memory + dummy
# OAuth2 + JWT secret). The backend is launched for smoke tests via:
#   ./mvnw spring-boot:test-run -Dspring-boot.run.profiles=smoke-test
# which gives us the test classpath (H2 driver available) plus the main
# application (all controllers, security, multi-tenancy).
#
# The dedicated profile also activates the @Profile("smoke-test") seed controller
# at /api/test/seed so the Playwright runner can provision a tenant + users on
# demand, without touching production data or code.

# H2 in-memory, Oracle compat mode — same URL used by provisioning so tenant
# schemas are created in the same in-memory database.
spring.datasource.url=jdbc:h2:mem:smoketestdb;MODE=Oracle;DATABASE_TO_LOWER=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Smaller connection pool — one Playwright worker talks to us sequentially.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# Multi-tenancy: provisioning DataSource points at the same H2 memory DB so
# TenantSchemaManager creates tenant schemas inside the same database.
app.multitenancy.application-schema=APPUSER
app.multitenancy.provisioning.jdbc-url=jdbc:h2:mem:smoketestdb;MODE=Oracle;DATABASE_TO_LOWER=FALSE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
app.multitenancy.provisioning.username=sa
app.multitenancy.provisioning.password=

# JWT secret (must be >= 32 bytes for HS256)
app.auth.token.secret=smoke-test-secret-key-at-least-32-bytes-long-for-hs256-signing-yes
app.auth.token.expiration-ms=3600000

# OAuth2 dummy config (prevents Google OAuth2 auto-config failure)
spring.security.oauth2.client.registration.google.client-id=smoke-test-client-id
spring.security.oauth2.client.registration.google.client-secret=smoke-test-client-secret
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=openid,profile,email
app.oauth2.authorized-redirect-uri=http://localhost:4200/oauth2/redirect

# Mail — disable real SMTP
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=smoke-test
spring.mail.password=smoke-test
app.mail.from=smoke-test@example.com
app.mail.from-name=Smoke Test

# Disable file upload side-effects
app.upload.dir=target/smoke-test-uploads

# No demo seed — the Playwright seed endpoint owns state.
app.seed.demo-data=false

# CORS — include both 4200 (smoke) and 4300 (dev) frontends
app.cors.allowed-origins=http://localhost:4200,http://localhost:4300
app.frontend.base-url=http://localhost:4200

# Fixed server port so Playwright webServer can wait on it.
server.port=8080
