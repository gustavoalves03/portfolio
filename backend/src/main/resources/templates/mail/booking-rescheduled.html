<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{mail/_layout :: html(pageTitle='Rendez-vous reprogrammé')}">
<body>
<div th:fragment="content">
    <h1>Votre rendez-vous a été reprogrammé</h1>
    <p>Bonjour <span th:text="${clientName}">…</span>,</p>
    <p>Votre rendez-vous chez <strong th:text="${salonName}">…</strong> a été reprogrammé.</p>
    <p>
        <strong>Soin :</strong> <span th:text="${careName}">…</span> (<span th:text="${careDuration}">…</span>)<br/>
        <strong>Avant :</strong> <span th:text="${oldAppointmentDate}">…</span> à <span th:text="${oldAppointmentTime}">…</span><br/>
        <strong>Désormais :</strong> <span th:text="${newAppointmentDate}">…</span> à <span th:text="${newAppointmentTime}">…</span><br/>
        <strong>Tarif :</strong> <span th:text="${carePrice}">…</span> €
    </p>
    <p><a th:href="${dashboardUrl}" class="cta">Voir mes rendez-vous</a></p>
    <p>À très bientôt !</p>
</div>
</body>
</html>
