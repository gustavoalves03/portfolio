spring.application.name=lux-pretty
# Reuse the repo-level .env for local `mvn spring-boot:run` as well as Docker Compose.
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]

# Profil par défaut (local dev avec Oracle)
# Pour utiliser H2 en mémoire: --spring.profiles.active=dev
# Pour Docker: --spring.profiles.active=docker (géré par variables d'env)

# Configuration Oracle (localhost)
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/FREEPDB1
spring.datasource.username=${APP_USER:appuser}
spring.datasource.password=${APP_USER_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Dedicated Oracle admin account used only for tenant schema provisioning.
# In prod set MULTITENANCY_PROVISIONING_USERNAME/PASSWORD to a dedicated DBA
# account. In local dev these can fall back to the SYSTEM credentials in .env.
app.multitenancy.application-schema=${APP_SCHEMA:${APP_USER:appuser}}
app.multitenancy.provisioning.jdbc-url=${MULTITENANCY_PROVISIONING_JDBC_URL:${spring.datasource.url}}
app.multitenancy.provisioning.username=${MULTITENANCY_PROVISIONING_USERNAME:${ORACLE_ADMIN_USER:}}
app.multitenancy.provisioning.password=${MULTITENANCY_PROVISIONING_PASSWORD:${ORACLE_PASSWORD:}}

# Hikari Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
# Required for schema-based multi-tenancy: avoid reusing a request-scoped
# EntityManager opened on APPUSER before TenantContext switches to a tenant schema.
spring.jpa.open-in-view=false

# Pagination caps (defense against abusive ?size= requests)
spring.data.web.pageable.max-page-size=100
spring.data.web.pageable.default-page-size=20

# File Upload Configuration
app.upload.dir=uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=25MB

# Storage backend: "local" writes to ${app.upload.dir} (dev/tests),
# "r2" writes to Cloudflare R2 (prod). When "r2" is selected, the four
# app.storage.r2.* properties below MUST be set or the context fails to start.
app.storage.backend=${STORAGE_BACKEND:local}
app.storage.r2.account-id=${R2_ACCOUNT_ID:}
app.storage.r2.bucket=${R2_BUCKET:}
app.storage.r2.access-key-id=${R2_ACCESS_KEY_ID:}
app.storage.r2.secret-access-key=${R2_SECRET_ACCESS_KEY:}

# OAuth2 Configuration
# Google OAuth2 (replace with your credentials from Google Cloud Console)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

# JWT Configuration
# JWT_SECRET MUST be set (>=32 bytes for HS256). The app fails to start if it's
# missing — by design, to avoid signing tokens with a known/default secret.
app.auth.token.secret=${JWT_SECRET}
app.auth.token.expiration-ms=86400000
# OAuth2 redirect URI after successful authentication (Angular frontend).
# No default — unset in prod must fail-fast rather than silently redirect to localhost.
# Local dev sets this in application-dev.properties.
app.oauth2.authorized-redirect-uri=${OAUTH2_REDIRECT_URI}

# Email / SMTP (Hostinger)
spring.mail.host=${SMTP_HOST:smtp.hostinger.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:noreply@example.com}
spring.mail.password=${SMTP_PASSWORD:change-me}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${SMTP_FROM:noreply@example.com}
app.mail.from-name=Pretty Face

# CORS allowed origins (comma-separated). No default — unset in prod must fail-fast.
# Local dev sets this in application-dev.properties.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Frontend base URL (used in email links e.g. password reset). No default —
# unset in prod must fail-fast rather than send users to localhost.
# Local dev sets this in application-dev.properties.
app.frontend.base-url=${FRONTEND_BASE_URL}

# Demo seed data for local/dev database bootstrap.
app.seed.demo-data=${APP_SEED_DEMO_DATA:true}

# Flyway — owns:
#   1. shared Oracle schema (db/migration/oracle, V1..V5+) — auto-wired by Spring.
#   2. NEW tenant schemas (db/migration/tenant, V1__baseline.sql) — invoked
#      programmatically by TenantFlywayService when a salon registers.
# Legacy tenants (provisioned before tenant Flyway shipped) keep going through
# TenantSchemaMigrator's idempotent ALTERs at startup. They will be baselined
# into Flyway once a staging environment exists; until then ddl-auto stays on
# update so Hibernate keeps adding new entity columns to legacy tenants and
# new shared tables. Flipping ddl-auto to validate is the next step (blocker #5).
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration/oracle
# spring.flyway.schemas is intentionally not set: Flyway uses the JDBC
# connection's default schema (the user we connect as, uppercased by Oracle).
# Setting it explicitly to ${APP_USER:appuser} would pass a lowercase identifier
# that Flyway quotes — Oracle then looks for a literally-lowercase schema and
# either fails or writes flyway_schema_history into a parallel namespace.
