# Docker profile: overrides application.properties for containerized deployment

# Mail (Docker: Postmark in prod, Mailpit/dev container for local testing)
spring.mail.host=${SPRING_MAIL_HOST:mailpit}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Mail Worker (outbox polling)
app.mail.worker.poll-interval-ms=30000
app.mail.worker.initial-delay-ms=10000

# Postmark integration (prod)
app.mail.postmark.api-token=${POSTMARK_API_TOKEN:}
app.mail.postmark.webhook-secret=${POSTMARK_WEBHOOK_SECRET:}
