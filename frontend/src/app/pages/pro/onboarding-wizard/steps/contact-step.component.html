<section class="step">
  <button type="button" class="step-back" (click)="back.emit()">← {{ 'common.back' | transloco }}</button>
  <h1 class="step-title">{{ 'pro.onboarding.wizard.contact.title' | transloco }}</h1>
  <p class="step-sub">{{ 'pro.onboarding.wizard.contact.sub' | transloco }}</p>

  <form (submit)="onSubmit(); $event.preventDefault()" class="step-form">
    <input name="street" type="text" class="step-input"
           [value]="street()" (input)="onInput('street', $event)"
           [placeholder]="'pro.onboarding.wizard.contact.streetPlaceholder' | transloco" />
    <div class="step-row">
      <input name="postalCode" type="text" class="step-input step-input-narrow"
             [value]="postalCode()" (input)="onInput('postalCode', $event)"
             [placeholder]="'pro.onboarding.wizard.contact.postalCodePlaceholder' | transloco" />
      <input name="city" type="text" class="step-input"
             [value]="city()" (input)="onInput('city', $event)"
             [placeholder]="'pro.onboarding.wizard.contact.cityPlaceholder' | transloco" />
    </div>
    <select name="country" class="step-input" [value]="country()" (input)="onInput('country', $event)">
      <option value="FR">France</option>
      <option value="BE">Belgique</option>
      <option value="CH">Suisse</option>
    </select>

    <p class="step-divider">{{ 'pro.onboarding.wizard.contact.atLeastOne' | transloco }}</p>

    <input name="phone" type="tel" class="step-input"
           [value]="phone()" (input)="onInput('phone', $event)"
           [placeholder]="'pro.onboarding.wizard.contact.phonePlaceholder' | transloco" />
    <input name="email" type="email" class="step-input"
           [value]="email()" (input)="onInput('email', $event)"
           [placeholder]="'pro.onboarding.wizard.contact.emailPlaceholder' | transloco" />

    @if (error()) {
      <p class="step-error">{{ 'pro.onboarding.wizard.errors.save' | transloco }}</p>
    }
    <button type="submit" class="step-cta" data-testid="next" [disabled]="!canSubmit() || saving()">
      {{ 'pro.onboarding.wizard.next' | transloco }} →
    </button>
  </form>
</section>
