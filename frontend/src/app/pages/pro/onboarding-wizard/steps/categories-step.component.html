<section class="step">
  <button type="button" class="step-back" (click)="back.emit()">← {{ 'common.back' | transloco }}</button>
  <h1 class="step-title">{{ 'pro.onboarding.wizard.categories.title' | transloco }}</h1>
  <p class="step-sub">{{ 'pro.onboarding.wizard.categories.sub' | transloco }}</p>

  <div class="cat-grid">
    @for (key of keys; track key) {
      <button
        type="button"
        class="cat-chip"
        [class.is-selected]="isSelected(key)"
        [attr.data-testid]="'category-chip-' + key"
        (click)="toggle(key)"
      >
        {{ 'home.v1.catalog.items.' + key | transloco }}
      </button>
    }
  </div>

  @if (error()) {
    <p class="step-error">{{ 'pro.onboarding.wizard.errors.save' | transloco }}</p>
  }

  <button type="button" class="step-cta" data-testid="next" [disabled]="!canSubmit() || saving()" (click)="onSubmit()">
    {{ 'pro.onboarding.wizard.next' | transloco }} →
  </button>
</section>
