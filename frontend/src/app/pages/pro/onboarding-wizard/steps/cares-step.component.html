<section class="step">
  <button type="button" class="step-back" (click)="back.emit()">← {{ 'common.back' | transloco }}</button>
  <h1 class="step-title">{{ 'pro.onboarding.wizard.cares.title' | transloco }}</h1>
  <p class="step-sub">{{ 'pro.onboarding.wizard.cares.sub' | transloco }}</p>

  <div class="persona-grid">
    @for (p of personas; track p.key) {
      <button
        type="button"
        class="persona-card"
        [attr.data-testid]="'persona-card-' + p.key"
        [disabled]="applying() !== null"
        [class.is-loading]="applying() === p.key"
        (click)="onPick(p)"
      >
        <span class="persona-label">{{ 'pro.dashboard.quickstart.persona.' + p.key + '.label' | transloco }}</span>
        <span class="persona-desc">{{ 'pro.dashboard.quickstart.persona.' + p.key + '.desc' | transloco }}</span>
      </button>
    }
  </div>

  @if (error()) {
    <p class="step-error">{{ 'pro.onboarding.wizard.cares.errors.apply' | transloco }}</p>
  }

  <a class="step-manual" data-testid="manual-link" routerLink="/pro/cares">
    {{ 'pro.onboarding.wizard.cares.manual' | transloco }}
  </a>
</section>
