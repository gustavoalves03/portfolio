<app-legal-layout titleKey="legal.cookies.title" [updatedAt]="updatedAt">
  @for (section of sections; track section) {
    <section class="legal-section">
      <h2>{{ 'legal.cookies.sections.' + section + '.title' | transloco }}</h2>
      <div [innerHTML]="'legal.cookies.sections.' + section + '.body' | transloco"></div>
    </section>
  }
</app-legal-layout>
