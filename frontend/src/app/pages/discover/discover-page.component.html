<div class="discover-layout">
  <!-- Left panel: search + salon list -->
  <div class="left-panel">
    <!-- Search bar -->
    <div class="search-bar-wrapper">
      <form class="discover-search" (submit)="onSearch(); $event.preventDefault()">
        <span class="search-icon">\ud83d\udd0d</span>
        <input
          type="text"
          class="search-input"
          [placeholder]="'discover.search' | transloco"
          [value]="searchQuery()"
          (input)="searchQuery.set($any($event.target).value)"
        />
      </form>
    </div>

    <!-- Salon list -->
    @if (salons().length > 0) {
      <div class="salon-list">
        @for (salon of salons(); track salon.slug; let i = $index) {
          <button
            type="button"
            class="salon-card"
            [class.hovered]="hoveredSlug() === salon.slug"
            (click)="onSalonClick(salon.slug)"
            (mouseenter)="onCardEnter(salon.slug)"
            (mouseleave)="onCardLeave(salon.slug)"
          >
            <div
              class="salon-card-avatar"
              [style.background]="salon.logoUrl ? 'url(' + salon.logoUrl + ') center/cover' : getGradient(i)"
            >
              @if (!salon.logoUrl) {
                <span class="salon-initial">{{ salon.name.charAt(0) }}</span>
              }
            </div>
            <div class="salon-card-body">
              <span class="salon-card-name">{{ salon.name }}</span>
              @if (salon.addressCity) {
                <span class="salon-card-city">\ud83d\udccd {{ salon.addressCity }}</span>
              }
              @if (salon.description) {
                <p class="salon-card-desc">{{ truncate(salon.description, 100) }}</p>
              }
              @if (salon.categoryNames) {
                <div class="salon-card-categories">
                  @for (catName of salon.categoryNames.split(', '); track catName) {
                    <span class="salon-card-chip">{{ catName }}</span>
                  }
                </div>
              }
            </div>
          </button>
        }
      </div>
    } @else {
      <div class="empty-state">
        <span class="empty-icon">\ud83d\udd0d</span>
        <p class="empty-title">{{ 'discover.noResults' | transloco }}</p>
        <p class="empty-hint">{{ 'discover.noResultsHint' | transloco }}</p>
      </div>
    }
  </div>

  <!-- Right panel: map -->
  <div class="right-panel">
    <div class="map-container" #mapContainer></div>
  </div>
</div>
