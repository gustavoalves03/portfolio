<div class="feature-locked-wrapper" [class.locked]="!enabled()">
  <ng-content />
  @if (!enabled()) {
    <div class="overlay" data-testid="upsell-overlay" aria-hidden="false">
      <div class="overlay-card">
        <mat-icon class="overlay-icon">lock_open</mat-icon>
        <p class="overlay-text">{{ upsellKey() | transloco }}</p>
        <a class="overlay-cta" routerLink="/pricing" [queryParams]="{ highlight: feature() }">
          {{ 'features.locked.cta' | transloco }}
        </a>
      </div>
    </div>
  }
</div>
