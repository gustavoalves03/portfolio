<div
  class="lp-logo"
  [class.lp-logo--small]="variant() === 'small'"
  [class.lp-logo--with-tagline]="variant() === 'with-tagline'"
>
  @if (variant() === 'small') {
    <!-- Monogram only — used in salon/pro header for the "back to home" link -->
    <svg
      class="lp-logo__svg lp-logo__svg--mono"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 56 56"
      role="img"
      aria-label="LuxPretty"
    >
      <title>LuxPretty</title>
      <defs>
        <linearGradient id="lp-rose-mono" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#C66075" />
          <stop offset="100%" stop-color="#A83E58" />
        </linearGradient>
      </defs>
      <rect x="0" y="0" width="56" height="56" rx="12" fill="url(#lp-rose-mono)" />
      <text
        x="28"
        y="36"
        text-anchor="middle"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-size="22"
        font-weight="500"
        letter-spacing="1.8"
        fill="#FFFFFF"
      >LXP</text>
    </svg>
  } @else {
    <!-- Full horizontal logo: monogram + 'LuxPretty' wordmark -->
    <svg
      class="lp-logo__svg lp-logo__svg--full"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 210 56"
      role="img"
      aria-label="LuxPretty"
    >
      <title>LuxPretty</title>
      <defs>
        <linearGradient id="lp-rose-full" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#C66075" />
          <stop offset="100%" stop-color="#A83E58" />
        </linearGradient>
      </defs>
      <rect x="0" y="0" width="56" height="56" rx="12" fill="url(#lp-rose-full)" />
      <text
        x="28"
        y="36"
        text-anchor="middle"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-size="22"
        font-weight="500"
        letter-spacing="1.8"
        fill="#FFFFFF"
      >LXP</text>
      <text
        x="72"
        y="35"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-size="22"
        font-weight="500"
        letter-spacing="1"
        fill="#2B1F25"
      >LuxPretty</text>
    </svg>
  }
  @if (showTagline()) {
    <span class="lp-logo__tagline">Beauté · Luxembourg</span>
  }
</div>
