<footer class="mt-12 border-t py-8 text-sm text-gray-600">
  <div class="container mx-auto px-4 flex flex-col gap-2 items-center">
    @if (isPro()) {
      <p>
        Propulsé par <a routerLink="/" class="text-neutral-900 hover:underline underline-offset-4">Pretty Face</a>
        · <a routerLink="/" class="text-neutral-500 hover:underline underline-offset-4">Abonnements</a>
      </p>
    } @else {
      <p>&copy; {{ year }} Pretty Face</p>
      @if (!isLoggedIn()) {
        <p>
          <a routerLink="/pricing" class="text-neutral-500 hover:text-neutral-900 hover:underline underline-offset-4">Vous êtes professionnel ? Créez votre vitrine</a>
        </p>
      }
    }
  </div>
</footer>
